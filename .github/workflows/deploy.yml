name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# не запускать несколько деплоев параллельно
concurrency:
  group: fly-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # --local-only: сборка на Docker GH-раннера (amd64, нативно), без зависимости
      # от remote-билдера Fly. Образ пушится в registry.fly.io по FLY_API_TOKEN.
      - name: Deploy
        run: flyctl deploy --local-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
